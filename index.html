<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống XSMB Pro - Tự Động 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #121212; --card-bg: #1e1e1e;
            --primary: #ff4d4d; --secondary: #2ecc71;
            --text: #e0e0e0; --blue: #3498db;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding-bottom: 60px; }
        .container { max-width: 500px; margin: auto; }
        
        /* Tab Menu */
        .tabs { display: flex; sticky: top; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .tab-item { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: #888; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* Bảng Kết Quả */
        .kq-table { width: 100%; border-collapse: collapse; background: var(--card-bg); margin-top: 10px; }
        .kq-table td { border: 1px solid #333; padding: 10px; text-align: center; font-weight: bold; font-size: 18px; }
        .label { width: 80px; color: #ff9f43; font-size: 14px; background: #252525; }
        .db-row { color: var(--primary); font-size: 24px !important; }

        /* Bàn phím ghép số */
        .grid-num { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .btn-num { background: #333; border: 1px solid #444; color: white; padding: 15px 0; border-radius: 5px; font-size: 18px; cursor: pointer; }
        .btn-num.active { background: var(--secondary); border-color: #fff; }
        .tool-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 0 10px 10px; }
        .btn-tool { background: #444; border: none; color: #ccc; padding: 8px 0; font-size: 12px; border-radius: 3px; }

        /* Hiển thị dàn số */
        #display-dan { background: #000; padding: 15px; margin: 10px; border-radius: 8px; color: #00ff00; word-break: break-all; min-height: 50px; border: 1px dashed #555; }

        /* Thống kê & Soi cầu */
        .stat-card { background: var(--card-bg); margin: 10px; padding: 15px; border-radius: 10px; border-left: 4px solid var(--blue); }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab-item active" onclick="openTab(event, 'kq')">KẾT QUẢ</div>
        <div class="tab-item" onclick="openTab(event, 'ghep')">GHÉP SỐ</div>
        <div class="tab-item" onclick="openTab(event, 'thongke')">THỐNG KÊ</div>
        <div class="tab-item" onclick="openTab(event, 'soicau')">SOI CẦU</div>
    </div>

    <div id="kq" class="panel active">
        <h3 style="text-align: center; color: var(--primary);">XSMB <span id="date-now">--/--</span></h3>
        <table class="kq-table" id="table-full">
            </table>
    </div>

    <div id="ghep" class="panel">
        <h4 style="margin: 15px 10px 5px;">HÀNG CHỤC (ĐẦU)</h4>
        <div class="grid-num" id="chuc-grid"></div>
        <div class="tool-bar">
            <button class="btn-tool" onclick="selectQuick('chuc', 'tai')">Tài</button>
            <button class="btn-tool" onclick="selectQuick('chuc', 'xiu')">Xỉu</button>
            <button class="btn-tool" onclick="selectQuick('chuc', 'le')">Lẻ</button>
            <button class="btn-tool" onclick="selectQuick('chuc', 'chan')">Chẵn</button>
            <button class="btn-tool" onclick="clearSet('chuc')">Xóa</button>
        </div>

        <h4 style="margin: 5px 10px;">HÀNG ĐƠN VỊ (ĐUÔI)</h4>
        <div class="grid-num" id="dv-grid"></div>
        <div class="tool-bar">
            <button class="btn-tool" onclick="selectQuick('dv', 'tai')">Tài</button>
            <button class="btn-tool" onclick="selectQuick('dv', 'xiu')">Xỉu</button>
            <button class="btn-tool" onclick="selectQuick('dv', 'le')">Lẻ</button>
            <button class="btn-tool" onclick="selectQuick('dv', 'chan')">Chẵn</button>
            <button class="btn-tool" onclick="clearSet('dv')">Xóa</button>
        </div>

        <div id="display-dan">Dàn số: </div>
        <button onclick="copyToClipboard()" style="width: 96%; margin: 0 2%; padding: 15px; background: var(--primary); border: none; color: white; font-weight: bold; border-radius: 5px;">SAO CHÉP DÀN</button>
    </div>

    <div id="thongke" class="panel">
        <div class="stat-card">
            <h4>Tần Suất Về (30 ngày)</h4>
            <canvas id="freqChart"></canvas>
        </div>
        <div class="stat-card">
            <h4>Lô Gan (Số chưa về lâu nhất)</h4>
            <div id="logan-list">99 - 25 ngày, 04 - 18 ngày...</div>
        </div>
    </div>

    <div id="tab-soicau" class="panel">
        <div class="stat-card">
            <h4 style="color: #f1c40f;">Dự Đoán Cầu Bạch Thủ</h4>
            <p id="suggest-btl">Đang tính toán dựa trên G3.2 và G5.4...</p>
        </div>
        <div class="stat-card">
            <h4>Cầu Chạm Đặc Biệt</h4>
            <p>Chạm đẹp hôm nay: <b style="color: var(--secondary);">3, 8</b></p>
        </div>
    </div>
</div>

<script>
    // 1. QUẢN LÝ TABS
    function openTab(evt, tabName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(tabName === 'soicau' ? 'tab-soicau' : tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    // 2. TẠO BÀN PHÍM
    let chucSet = new Set(), dvSet = new Set();
    function initButtons() {
        const cGrid = document.getElementById('chuc-grid');
        const dGrid = document.getElementById('dv-grid');
        for(let i=0; i<10; i++) {
            cGrid.innerHTML += `<button class="btn-num" id="c-${i}" onclick="toggleNum('chuc', ${i})">${i}</button>`;
            dGrid.innerHTML += `<button class="btn-num" id="d-${i}" onclick="toggleNum('dv', ${i})">${i}</button>`;
        }
    }

    function toggleNum(type, n) {
        let set = (type === 'chuc') ? chucSet : dvSet;
        let id = (type === 'chuc') ? `c-${n}` : `d-${n}`;
        if(set.has(n)) set.delete(n); else set.add(n);
        document.getElementById(id).classList.toggle('active');
        renderDan();
    }

    function selectQuick(type, mode) {
        clearSet(type);
        for(let i=0; i<10; i++) {
            if(mode==='tai' && i>=5) toggleNum(type, i);
            if(mode==='xiu' && i<5) toggleNum(type, i);
            if(mode==='le' && i%2!==0) toggleNum(type, i);
            if(mode==='chan' && i%2===0) toggleNum(type, i);
        }
    }

    function clearSet(type) {
        if(type==='chuc') { chucSet.clear(); document.querySelectorAll('#chuc-grid button').forEach(b=>b.classList.remove('active')); }
        else { dvSet.clear(); document.querySelectorAll('#dv-grid button').forEach(b=>b.classList.remove('active')); }
        renderDan();
    }

    function renderDan() {
        let res = [];
        Array.from(chucSet).sort().forEach(c => {
            Array.from(dvSet).sort().forEach(d => res.push(c+""+d));
        });
        document.getElementById('display-dan').innerText = "Dàn (" + res.length + " số): " + res.join(", ");
    }

    // 3. LẤY KẾT QUẢ TỰ ĐỘNG (API GIẢ LẬP)
    // Lưu ý: Để có dữ liệu thật, bạn nên dùng API từ các nhà cung cấp như lodevn hoặc tự viết Proxy
    async function loadResults() {
        const table = document.getElementById('table-full');
        // Mô phỏng dữ liệu XSMB
        const data = [
            {l: "ĐB", v: "77544", c: "db-row"}, {l: "G1", v: "01588"},
            {l: "G2", v: "72768 - 51488"}, {l: "G3", v: "34503 - 00614 - 35374 <br> 49675 - 70691 - 32192"},
            {l: "G4", v: "4392 - 6948 - 2527 - 9841"}, {l: "G5", v: "7635 - 4754 - 2263 <br> 0079 - 9265 - 0004"},
            {l: "G6", v: "498 - 207 - 710"}, {l: "G7", v: "72 - 17 - 27 - 55"}
        ];
        table.innerHTML = data.map(r => `<tr><td class="label">${r.l}</td><td class="${r.c||''}">${r.v}</td></tr>`).join('');
        document.getElementById('date-now').innerText = new Date().toLocaleDateString('vi-VN');
    }

    // 4. VẼ BIỂU ĐỒ THỐNG KÊ
    function drawChart() {
        const ctx = document.getElementById('freqChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['01','15','22','44','56','78','89','90'],
                datasets: [{ label: 'Số lần xuất hiện', data: [12, 19, 3, 5, 2, 8, 15, 7], backgroundColor: '#3498db' }]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });
    }

    function copyToClipboard() {
        const text = document.getElementById('display-dan').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Đã sao chép!"));
    }

    // Chạy khởi tạo
    window.onload = () => { initButtons(); loadResults(); drawChart(); };
</script>
</body>
</html>
