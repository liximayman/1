<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống XSMB Pro - Tự Động 2026</title>
    <style>
        :root {
            --bg-dark: #121212; --card-bg: #1e1e1e;
            --primary: #ff4d4d; --secondary: #2ecc71;
            --text: #e0e0e0; --blue: #3498db;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding-bottom: 60px; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .tabs { display: flex; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .tab-item { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 14px; font-weight: bold; color: #888; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        /* Box kết quả thu nhỏ lại một chút để dễ cuộn */
        .live-box { width: 100%; height: 500px; overflow-y: auto; overflow-x: hidden; position: relative; background: #fff; border-radius: 2px; margin-bottom: 20px; border: 1px solid #333; }
        .live-box iframe { width: 100%; height: 1500px; border: none; margin-top: -80px; }

        .grid-num { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; padding: 2px 0; }
        .btn-num { background: #333; border: 1px solid #444; color: white; padding: 4px 0; border-radius: 2px; font-size: 15px; cursor: pointer; }
        .btn-num.active { background: var(--secondary); border-color: #fff; box-shadow: 0 0 5px var(--secondary); }
        
        #display-dan, .result-box { background: #000; padding: 5px; margin: 5px 0; border-radius: 2px; color: #00ff00; word-break: break-all; min-height: 50px; border: 1px dashed #555; font-family: monospace; font-size: 15px; line-height: 1.4; }
        .panel { display: none; }
        .panel.active { display: block; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .field-group { margin-bottom: 15px; }
        .field-group label { display: block; margin-bottom: 5px; font-size: 15px; color: #bbb; font-weight: bold; }
        textarea, select { width: 100%; background: #252525; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        .btn-main { width: 100%; padding: 15px; background: var(--blue); border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .stats { font-size: 13px; color: var(--secondary); margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab-item active" onclick="openTab(event, 'main-panel')">SOI CẦU & GHÉP</div>
        <div class="tab-item" onclick="openTab(event, 'xien-panel')">XIÊN GHÉP</div>
    </div>

    <div class="container">
        <div id="main-panel" class="panel active">
            <div class="live-box">
                <iframe src="https://az24.vn/xsmb-30-ngay.html"></iframe>
            </div>

            <h4 style="margin: 10px 0 5px 0; color: var(--primary);">ĐẦU (Hàng chục)</h4>
            <div class="grid-num" id="chuc-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(3, 1fr); padding-top:0;">
                <button class="btn-num" style="background:#FF4500;" onclick="selectQuick('chuc', 'tatca')">Tất cả</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'tai')">Tài</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'xiu')">Xỉu</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'le')">Lẻ</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'chan')">Chẵn</button>
                <button class="btn-num" style="background:#600;" onclick="clearSet('chuc')">Xóa</button>
            </div>

            <h4 style="margin: 15px 0 5px 0; color: var(--primary);">ĐUÔI (Hàng đơn vị)</h4>
            <div class="grid-num" id="dv-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(3, 1fr); padding-top:0;">
                <button class="btn-num" style="background:#FF4500;" onclick="selectQuick('dv', 'tatca')">Tất cả</button>
                <button class="btn-num" onclick="selectQuick('dv', 'tai')">Tài</button>
                <button class="btn-num" onclick="selectQuick('dv', 'xiu')">Xỉu</button>
                <button class="btn-num" onclick="selectQuick('dv', 'le')">Lẻ</button>
                <button class="btn-num" onclick="selectQuick('dv', 'chan')">Chẵn</button>
                <button class="btn-num" style="background:#600;" onclick="clearSet('dv')">Xóa</button>
            </div>
            
            <div id="display-dan">Dàn số: (Trống)</div>
            <button id="copyDanBtn" class="btn-main" onclick="copyToClipboard()">SAO CHÉP DÀN</button>
        </div>

        <div id="xien-panel" class="panel">
            <h2 style="color: var(--secondary); font-size: 18px;">Ghép Xiên Thông Minh</h2>
            <div class="field-group">
                <label>Nhập dãy số:</label>
                <textarea id="inputNumbers" rows="3" placeholder="Ví dụ: 01 02 03 04 05" oninput="processXien()"></textarea>
            </div>
            <div class="field-group">
                <label>Loại xiên:</label>
                <select id="xienType" onchange="processXien()">
                    <option value="2">Xiên 2</option>
                    <option value="3">Xiên 3</option>
                    <option value="4">Xiên 4</option>
                </select>
            </div>
            <div class="field-group">
                <label>Số loại bỏ (Số khan):</label>
                <textarea id="excludeNumbers" rows="1" placeholder="Ví dụ: 13 49" oninput="processXien()"></textarea>
            </div>
            <div id="resultContainer" style="display:none;">
                <div id="count" class="stats"></div>
                <div id="output" class="result-box"></div>
                <button id="copyXienBtn" class="btn-main" style="background: var(--blue);" onclick="copyXien()">SAO CHÉP KẾT QUẢ</button>
            </div>
        </div>
    </div>

<script>
    let chucSet = new Set(), dvSet = new Set();
    let currentXienResult = "";
    let touchstartX = 0, touchendX = 0;

    function initButtons() {
        const cGrid = document.getElementById('chuc-grid');
        const dGrid = document.getElementById('dv-grid');
        for(let i=0; i<10; i++) {
            cGrid.innerHTML += `<button class="btn-num" id="c-${i}" onclick="toggleNum('chuc', ${i})">${i}</button>`;
            dGrid.innerHTML += `<button class="btn-num" id="d-${i}" onclick="toggleNum('dv', ${i})">${i}</button>`;
        }
        initSwipeEvents();
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        if (evt) {
            evt.currentTarget.classList.add('active');
        } else {
            const index = tabName === 'main-panel' ? 0 : 1;
            document.querySelectorAll('.tab-item')[index].classList.add('active');
        }
    }

    function toggleNum(type, n) {
        let set = (type === 'chuc') ? chucSet : dvSet;
        let id = (type === 'chuc') ? `c-${n}` : `d-${n}`;
        if(set.has(n)) set.delete(n); else set.add(n);
        document.getElementById(id).classList.toggle('active');
        renderDan();
    }

    function renderDan() {
        let res = [];
        let chucArr = Array.from(chucSet).sort();
        let dvArr = Array.from(dvSet).sort();
        chucArr.forEach(c => dvArr.forEach(d => res.push(c + "" + d)));
        const display = document.getElementById('display-dan');
        display.innerText = res.length > 0 ? "Dàn (" + res.length + " số): " + res.join(", ") : "Dàn số: (Trống)";
    }

    function selectQuick(type, mode) {
        clearSet(type);
        for(let i=0; i<10; i++) {
            if((mode==='tai' && i>=5) || (mode==='xiu' && i<5) || (mode==='le' && i%2!==0) || (mode==='chan' && i%2===0) || mode==='tatca') {
                toggleNum(type, i);
            }
        }
    }

    function clearSet(type) {
        if(type==='chuc') { chucSet.clear(); document.querySelectorAll('#chuc-grid .btn-num').forEach(b=>b.classList.remove('active')); }
        else { dvSet.clear(); document.querySelectorAll('#dv-grid .btn-num').forEach(b=>b.classList.remove('active')); }
        renderDan();
    }

    function copyToClipboard() {
        const displayText = document.getElementById('display-dan').innerText;
        if (displayText.includes("(Trống)")) return alert("Chưa có số!");
        const cleanText = displayText.split(": ")[1];
        const btn = document.getElementById('copyDanBtn');
        navigator.clipboard.writeText(cleanText).then(() => {
            btn.innerText = "COPIED ✓";
            btn.style.background = "#2ecc71";
            setTimeout(() => { btn.innerText = "SAO CHÉP DÀN"; btn.style.background = "#3498db"; }, 1500);
        });
    }

    function initSwipeEvents() {
        document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            const xDist = touchendX - touchstartX;
            if (Math.abs(xDist) > 100) {
                if (xDist < 0) openTab(null, 'xien-panel');
                else openTab(null, 'main-panel');
            }
        }, {passive: true});
    }

    function processXien() {
        const input = document.getElementById('inputNumbers').value;
        const exclude = document.getElementById('excludeNumbers').value;
        const size = parseInt(document.getElementById('xienType').value);
        let numbers = [...new Set(input.split(/[\s, \n, .]+/).filter(n => n.length > 0))];
        let excludeList = exclude.split(/[\s, \n, .]+/).filter(n => n.length > 0);
        numbers = numbers.filter(n => !excludeList.includes(n));
        const container = document.getElementById('resultContainer');
        if (numbers.length < size) { container.style.display = 'none'; return; }
        let results = [];
        function combine(start, path) {
            if (path.length === size) { results.push(path.join("-")); return; }
            for (let i = start; i < numbers.length; i++) combine(i + 1, [...path, numbers[i]]);
        }
        combine(0, []);
        currentXienResult = results.join("\n");
        container.style.display = 'block';
        document.getElementById('output').innerText = results.join(", ");
        document.getElementById('count').innerText = `✓ Đã ghép thành công: ${results.length} cặp xiên ${size}`;
    }

    function copyXien() {
        navigator.clipboard.writeText(currentXienResult).then(() => {
            const btn = document.getElementById('copyXienBtn');
            btn.innerText = "COPIED ✓"; btn.style.background = "#2ecc71";
            setTimeout(() => { btn.innerText = "SAO CHÉP KẾT QUẢ"; btn.style.background = "#3498db"; }, 1500);
        });
    }

    window.onload = initButtons;
</script>
</body>
</html>
