<!DOCTYPE html>
<html lang="vi">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống XSMB Pro - Tự Động 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #121212; --card-bg: #1e1e1e;
            --primary: #ff4d4d; --secondary: #2ecc71;
            --text: #e0e0e0; --blue: #3498db;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding-bottom: 60px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; }
        
        /* Tab Menu */
        .tabs { display: flex; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .tab-item { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: #888; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* Khung Live Kết Quả (Lấy từ nguồn xosodaiphat) */
        .live-box {
            width: 100%;
            height: 10000px;
            overflow: hidden;
            position: relative;
            background: #fff;
            border-radius: 8px;
            margin-top: 10px;
        }
        /* Kỹ thuật lồng iframe để chỉ hiện bảng kết quả */
        .live-box iframe {
            position: absolute;
            top: -80px; /* Điều chỉnh số này để căn đúng bảng KQ */
            left: 100;
            width: 100%;
            height: 100000px;
            border: none;
            display: 100%;
        }

        /* Các phần khác giữ nguyên style cũ hoặc tối ưu thêm */
        .grid-num { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .btn-num { background: #333; border: 1px solid #444; color: white; padding: 15px 0; border-radius: 5px; font-size: 18px; cursor: pointer; }
        .btn-num.active { background: var(--secondary); border-color: #fff; }
        
        #display-dan { background: #000; padding: 15px; margin: 10px; border-radius: 8px; color: #00ff00; word-break: break-all; min-height: 50px; border: 1px dashed #555; font-family: monospace; }
        .panel { display: none; padding: 10px; }
        .panel.active { display: block; }
        .stat-card { background: var(--card-bg); margin-bottom: 10px; padding: 15px; border-radius: 10px; border-left: 4px solid var(--blue); }
    </style>
</head>
<body>
    
   <div class="container">
        <div class="tabs">
        <div class="tab-item active" onclick="openTab(event, 'kq')">KẾT QUẢ LIVE</div>
        <div class="tab-item" onclick="openTab(event, 'ghep')">GHÉP SỐ</div>
        </div>

        <div id="kq" class="panel active">
        <div style="text-align: center; margin-bottom: 10px;">
            <span style="color: #2ecc71; font-size: 12px;">● Đã kết nối dữ liệu...</span>
        </div>
        <div class="live-box">
            <iframe src="https://az24.vn/xsmb-30-ngay.html" scrolling="no"></iframe>
        </div>
        <p style="font-size: 11px; color: #666; text-align: center; margin-top: 10px;">
            Nguồn dữ liệu: az24.vn
        </p>
    </div>

    <div id="ghep" class="panel">
        <h4 style="margin: 10px 0;">ĐẦU (Hàng chục)</h4>
        <div class="grid-num" id="chuc-grid"></div>
        <div id="chuc-tools" class="grid-num" style="grid-template-columns: repeat(5, 1fr); padding-top:0;">
            <button class="btn-num" style="font-size:12px; height:35px;" onclick="selectQuick('chuc', 'tai')">Tài</button>
            <button class="btn-num" style="font-size:12px; height:35px;" onclick="selectQuick('chuc', 'xiu')">Xỉu</button>
            <button class="btn-num" style="font-size:12px; height:35px;" onclick="selectQuick('chuc', 'le')">Lẻ</button>
            <button class="btn-num" style="font-size:12px; height:35px;" onclick="selectQuick('chuc', 'chan')">Chẵn</button>
            <button class="btn-num" style="font-size:12px; height:35px; background:#600;" onclick="clearSet('chuc')">Xóa</button>
       <button class="btn-num" style="font-size:12px; height:35px; background:#007bff;" onclick="selectQuick('chuc', 'tatca')">tất cả</button>    
        </div>

        <h4 style="margin: 10px 0;">ĐUÔI (Hàng đơn vị)</h4>
        <div class="grid-num" id="dv-grid"></div>
        <div id="dv-tools" class="grid-num" style="grid-template-columns: repeat(5, 1fr); padding-top:0;">
            <button class="btn-num" style="font-size:12px; height:35px;" onclick="selectQuick('dv', 'tai')">Tài</button>
            <button class="btn-num" style="font-size:12px; height:35px;" onclick="selectQuick('dv', 'xiu')">Xỉu</button>
            <button class="btn-num" style="font-size:12px; height:35px;" onclick="selectQuick('dv', 'le')">Lẻ</button>
            <button class="btn-num" style="font-size:12px; height:35px;" onclick="selectQuick('dv', 'chan')">Chẵn</button>
            <button class="btn-num" style="font-size:12px; height:35px; background:#600;" onclick="clearSet('dv')">Xóa</button>
        <button class="btn-num" style="font-size:12px; height:35px; background:#007bff;" onclick="selectQuick('dv', 'tatca')">tất cả</button>    
      </div>

        <div id="display-dan">Dàn số: </div>
        <button onclick="copyToClipboard()" style="width: 100%; padding: 15px; background:#007bff; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer;">SAO CHÉP DÀN</button>
    </div>
   <div>   
</div>

<script>
    function openTab(evt, tabName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
        if(tabName === 'thongke') drawChart();
    }
    
    // Khởi tạo phím số
    let chucSet = new Set(), dvSet = new Set();
    function initButtons() {
        const cGrid = document.getElementById('chuc-grid');
        const dGrid = document.getElementById('dv-grid');
        for(let i=0; i<10; i++) {
            cGrid.innerHTML += `<button class="btn-num" id="c-${i}" onclick="toggleNum('chuc', ${i})">${i}</button>`;
            dGrid.innerHTML += `<button class="btn-num" id="d-${i}" onclick="toggleNum('dv', ${i})">${i}</button>`;
        }
    }

    function toggleNum(type, n) {
        let set = (type === 'chuc') ? chucSet : dvSet;
        let id = (type === 'chuc') ? `c-${n}` : `d-${n}`;
        if(set.has(n)) set.delete(n); else set.add(n);
        document.getElementById(id).classList.toggle('active');
        renderDan();
    }

    function selectQuick(type, mode) {
        clearSet(type);
        for(let i=0; i<10; i++) {
            if(mode==='tai' && i>=5) toggleNum(type, i);
            if(mode==='xiu' && i<5) toggleNum(type, i);
            if(mode==='le' && i%2!==0) toggleNum(type, i);
            if(mode==='chan' && i%2===0) toggleNum(type, i);
            if(mode==='tatca' && i<10) toggleNum(type, i);
            }
    }

    function clearSet(type) {
        if(type==='chuc') { chucSet.clear(); document.querySelectorAll('#chuc-grid button').forEach(b=>b.classList.remove('active')); }
        else { dvSet.clear(); document.querySelectorAll('#dv-grid button').forEach(b=>b.classList.remove('active')); }
        renderDan();
    }

    function renderDan() {
        let res = [];
        Array.from(chucSet).sort().forEach(c => {
            Array.from(dvSet).sort().forEach(d => res.push(c+""+d));
        });
        document.getElementById('display-dan').innerText = "Dàn (" + res.length + " số): " + res.join(", ");
    }

    function drawChart() {
        const ctx = document.getElementById('freqChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Th2', 'Th3', 'Th4', 'Th5', 'Th6', 'Th7', 'CN'],
                datasets: [{ label: 'Nhịp đầu 8', data: [2, 5, 1, 4, 3, 6, 2], borderColor: '#3498db', tension: 0.4 }]
            }
        });
    }

    function copyToClipboard() {
        const text = document.getElementById('display-dan').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Đã sao chép!"));
    }

    window.onload = initButtons;
</script>
</body>
                </html>
