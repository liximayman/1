<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống XSMB Pro 2026</title>
    <style>
        :root {
            --bg-dark: #0f0f0f; 
            --card-bg: #1e1e1e;
            --primary: #ff4d4d; 
            --secondary: #2ecc71;
            --text: #e0e0e0; 
            --blue: #3498db;
            --gray: #333;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 15px;
            overflow-x: hidden;
        }
        .container { max-width: 500px; margin: auto; }
        
        .tabs { 
            display: flex; 
            background: #000; 
            border-bottom: 1px solid #333; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .tab-item { 
            flex: 1; 
            padding: 12px 2px; 
            text-align: center; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: bold; 
            color: #888; 
            text-transform: uppercase;
        }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #1a1a1a; }

        .live-container { padding: 5px; background: #000; }
        .live-box {
            width: 100%;
            height: 30vh; 
            overflow-y: auto; 
            background: #fff;
            border-radius: 6px;
            border: 1px solid var(--gray);
        }
        .live-box iframe { width: 100%; height: 1000px; border: none; }

        #display-dan { 
            background: #050505; 
            padding: 12px; 
            margin: 10px; 
            border-radius: 6px; 
            color: #00ff00; 
            word-break: break-all; 
            min-height: 40px; 
            border: 1px dashed #444; 
            font-family: 'Courier New', monospace; 
            font-size: 13px; 
        }

        .grid-num { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 5px; 
            padding: 8px; 
        }
        .btn-num { 
            background: #262626; 
            border: 1px solid #444; 
            color: white; 
            padding: 10px 0; 
            border-radius: 4px; 
            font-size: 15px; 
            font-weight: 600;
            cursor: pointer; 
        }
        .btn-num.active { background: var(--secondary); color: #000; border-color: #fff; }
        
        .panel { display: none; }
        .panel.active { display: block; }
        h4 { margin: 15px 10px 5px; color: var(--blue); font-size: 14px; }
        
        .btn-copy-main { 
            width: calc(100% - 24px); 
            padding: 14px; 
            background: var(--blue); 
            border: none; 
            color: white; 
            font-weight: bold; 
            border-radius: 6px; 
            margin: 12px;
            cursor: pointer;
        }

        textarea, select { 
            width: calc(100% - 20px); 
            background: #1a1a1a; 
            color: #fff; 
            border: 1px solid #444; 
            padding: 10px; 
            margin: 5px 10px; 
            border-radius: 6px;
        }
        .result-box { 
            background: #000; 
            padding: 10px; 
            color: #2ecc71; 
            margin: 10px; 
            border-radius: 6px; 
            min-height: 40px; 
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="tabs">
            <div class="tab-item active" onclick="openTab(event, 'main-tool')">GHÉP DÀN</div>
            <div class="tab-item" onclick="openTab(event, 'xien')">XIÊN GHÉP</div>
        </div>

        <div id="main-tool" class="panel active">
            <div class="live-container">
                <div class="live-box">
                    <iframe src="https://az24.vn/xsmb-30-ngay.html"></iframe>
                </div>
                <div id="display-dan">Dàn số: (Chưa chọn)</div>
            </div>
            
            <h4>1. HÀNG NGHÌN (4D)</h4>
            <div class="grid-num" id="nghin-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(3, 1fr); padding-top:0;">
                <button class="btn-num" style="font-size:12px;" onclick="selectQuick('nghin', 'chan')">CHẴN</button>
                <button class="btn-num" style="font-size:12px;" onclick="selectQuick('nghin', 'le')">LẺ</button>
                <button class="btn-num" style="background:#600; font-size:12px;" onclick="clearSet('nghin')">XÓA</button>
            </div>

            <h4>2. HÀNG TRĂM (3D)</h4>
            <div class="grid-num" id="tram-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(3, 1fr); padding-top:0;">
                <button class="btn-num" style="font-size:12px;" onclick="selectQuick('tram', 'chan')">CHẴN</button>
                <button class="btn-num" style="font-size:12px;" onclick="selectQuick('tram', 'le')">LẺ</button>
                <button class="btn-num" style="background:#600; font-size:12px;" onclick="clearSet('tram')">XÓA</button>
            </div>
        
            <h4>3. HÀNG CHỤC (2D)</h4>
            <div class="grid-num" id="chuc-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(3, 1fr); padding-top:0;">
                <button class="btn-num" style="font-size:12px;" onclick="selectQuick('chuc', 'chan')">CHẴN</button>
                <button class="btn-num" style="font-size:12px;" onclick="selectQuick('chuc', 'le')">LẺ</button>
                <button class="btn-num" style="background:#600; font-size:12px;" onclick="clearSet('chuc')">XÓA</button>
            </div>

            <h4>4. HÀNG ĐƠN VỊ (1D)</h4>
            <div class="grid-num" id="dv-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(3, 1fr); padding-top:0;">
                <button class="btn-num" style="font-size:12px;" onclick="selectQuick('dv', 'chan')">CHẴN</button>
                <button class="btn-num" style="font-size:12px;" onclick="selectQuick('dv', 'le')">LẺ</button>
                <button class="btn-num" style="background:#600; font-size:12px;" onclick="clearSet('dv')">XÓA</button>
            </div>

            <button onclick="copyDan()" class="btn-copy-main">SAO CHÉP DÀN SỐ</button>
        </div>

        <div id="xien" class="panel" style="padding:10px;">
            <h3 style="color:var(--secondary); text-align:center;">GHÉP XIÊN TỰ ĐỘNG</h3>
            <textarea id="inputNumbers" rows="3" placeholder="Nhập các số cách nhau bằng dấu cách..."></textarea>
            <select id="xienType">
                <option value="2">Xiên 2</option>
                <option value="3">Xiên 3</option>
                <option value="4">Xiên 4</option>
            </select>
            <button onclick="processXien()" class="btn-copy-main" style="background: var(--secondary);">BẮT ĐẦU GHÉP</button>
            <div id="resultContainer" style="display:none;">
                <div id="output" class="result-box"></div>
                <button onclick="copyXien()" class="btn-copy-main" style="background: #555;">SAO CHÉP XIÊN</button>
            </div>
        </div>
    </div>

<script>
    let nghinSet = new Set(), tramSet = new Set(), chucSet = new Set(), dvSet = new Set();
    let currentXienResult = "";
    
    function initButtons() {
        const grids = {
            'nghin': document.getElementById('nghin-grid'),
            'tram': document.getElementById('tram-grid'),
            'chuc': document.getElementById('chuc-grid'),
            'dv': document.getElementById('dv-grid')
        };
        
        for (let type in grids) {
            grids[type].innerHTML = ""; // Clear cũ
            for (let i = 0; i < 10; i++) {
                let prefix = type === 'nghin' ? 'n' : (type === 'tram' ? 't' : (type === 'chuc' ? 'c' : 'd'));
                grids[type].innerHTML += `<button class="btn-num" id="${prefix}-${i}" onclick="toggleNum('${type}', ${i})">${i}</button>`;
            }
        }
    }

    function toggleNum(type, n) {
        let set, prefix;
        if (type === 'nghin') { set = nghinSet; prefix = 'n'; }
        else if (type === 'tram') { set = tramSet; prefix = 't'; }
        else if (type === 'chuc') { set = chucSet; prefix = 'c'; }
        else { set = dvSet; prefix = 'd'; }

        const btn = document.getElementById(`${prefix}-${n}`);
        if (set.has(n)) {
            set.delete(n);
            btn.classList.remove('active');
        } else {
            set.add(n);
            btn.classList.add('active');
        }
        renderDan();
    }

    function renderDan() {
        let res = [];
        let nArr = Array.from(nghinSet).sort();
        let tArr = Array.from(tramSet).sort();
        let cArr = Array.from(chucSet).sort();
        let dArr = Array.from(dvSet).sort();

        // Tự động nhận diện loại dàn (nếu hàng nào trống thì bỏ qua hàng đó)
        let loopN = nArr.length ? nArr : [""];
        let loopT = tArr.length ? tArr : [""];
        let loopC = cArr.length ? cArr : [""];
        let loopD = dArr.length ? dArr : [""];

        if (!nArr.length && !tArr.length && !cArr.length && !dArr.length) {
            document.getElementById('display-dan').innerText = "Dàn số: (Chưa chọn)";
            return;
        }

        loopN.forEach(n => {
            loopT.forEach(t => {
                loopC.forEach(c => {
                    loopD.forEach(d => {
                        res.push(`${n}${t}${c}${d}`);
                    });
                });
            });
        });

        document.getElementById('display-dan').innerText = `Dàn (${res.length} số): ` + res.join(", ");
    }

    function selectQuick(type, mode) {
        for (let i = 0; i < 10; i++) {
            let shouldSelect = false;
            if (mode === 'chan' && i % 2 === 0) shouldSelect = true;
            if (mode === 'le' && i % 2 !== 0) shouldSelect = true;
            
            // Nếu nút chưa được chọn mà cần chọn, hoặc đã chọn mà không đúng mode thì xử lý
            let set = (type === 'nghin' ? nghinSet : (type === 'tram' ? tramSet : (type === 'chuc' ? chucSet : dvSet)));
            if (shouldSelect && !set.has(i)) toggleNum(type, i);
            if (!shouldSelect && set.has(i)) toggleNum(type, i);
        }
    }

    function clearSet(type) {
        let set, prefix;
        if (type === 'nghin') { set = nghinSet; prefix = 'n'; }
        else if (type === 'tram') { set = tramSet; prefix = 't'; }
        else if (type === 'chuc') { set = chucSet; prefix = 'c'; }
        else { set = dvSet; prefix = 'd'; }
        
        set.clear();
        document.querySelectorAll(`#${type}-grid .btn-num`).forEach(b => b.classList.remove('active'));
        renderDan();
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function copyDan() {
        const text = document.getElementById('display-dan').innerText;
        if (text.includes(": ")) {
            navigator.clipboard.writeText(text.split(": ")[1]).then(() => alert("✅ Đã sao chép!"));
        }
    }

    function processXien() {
        const input = document.getElementById('inputNumbers').value;
        const size = parseInt(document.getElementById('xienType').value);
        let numbers = [...new Set(input.split(/[\s, \n]+/).filter(n => n.length > 0))];
        if (numbers.length < size) { alert("Không đủ số!"); return; }
        let results = [];
        function combine(start, path) {
            if (path.length === size) { results.push(path.join("-")); return; }
            for (let i = start; i < numbers.length; i++) combine(i + 1, [...path, numbers[i]]);
        }
        combine(0, []);
        currentXienResult = results.join(", ");
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('output').innerText = currentXienResult;
    }

    function copyXien() {
        navigator.clipboard.writeText(currentXienResult).then(() => alert("✅ Đã sao chép xiên!"));
    }

    window.onload = initButtons;
</script>
</body>
</html>
